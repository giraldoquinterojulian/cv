<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0b1020;
      --text: #eef2ff;
      --muted: #b8c0e0;
      --accent: #6ea8fe;
      --accent-2: #8b5cf6;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --radius: 18px;
      --max: 1320px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,254,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 24%),
        linear-gradient(180deg, #0a1022 0%, #0b1020 100%);
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s ease;
    }

    body.ats-mode {
      background: #ffffff;
      color: #111827;
    }

    body.ats-mode a { color: #111827; }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px;
    }

    .hero,
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 24px;
      backdrop-filter: blur(16px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 24px;
    }

    body.ats-mode .hero,
    body.ats-mode .card {
      background: #ffffff;
      border: 1px solid #d1d5db;
      box-shadow: none;
      backdrop-filter: none;
      color: #111827;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(110,168,254,0.12);
      color: #dbeafe;
      font-size: 12px;
      border: 1px solid rgba(110,168,254,0.25);
      margin-bottom: 14px;
    }

    body.ats-mode .eyebrow {
      background: #f3f4f6;
      color: #111827;
      border-color: #d1d5db;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.03;
      letter-spacing: -0.03em;
    }

    .headline {
      font-size: 18px;
      color: #dbe3ff;
      margin: 0 0 12px;
      max-width: 920px;
    }

    body.ats-mode .headline { color: #111827; }

    .summary {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      max-width: 920px;
      font-size: 15px;
      transition: opacity 0.18s ease;
    }

    body.ats-mode .summary,
    body.ats-mode .meta,
    body.ats-mode .list-clean,
    body.ats-mode .experience-summary,
    body.ats-mode .experience-period {
      color: #374151;
    }

    .meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      margin-top: 22px;
    }

    .segment {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    body.ats-mode .btn {
      background: #ffffff;
      border-color: #d1d5db;
      color: #111827;
      box-shadow: none;
    }

    .btn:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    .btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(110,168,254,0.25);
    }

    body.ats-mode .btn.active {
      background: #111827;
      color: #ffffff;
      box-shadow: none;
    }

    .toggle {
      display: inline-flex;
      padding: 4px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      gap: 4px;
    }

    body.ats-mode .toggle {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .toggle button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    body.ats-mode .toggle button { color: #6b7280; }

    .toggle button.active {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    body.ats-mode .toggle button.active {
      background: #111827;
      color: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 22px;
    }

    .card {
      padding: 22px;
    }

    .sticky {
      position: sticky;
      top: 20px;
      align-self: start;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #c7d2fe;
      margin: 0 0 16px;
    }

    body.ats-mode .section-title { color: #374151; }

    .stack {
      display: grid;
      gap: 22px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      color: #e8ecff;
    }

    body.ats-mode .chip {
      background: #f3f4f6;
      border-color: #e5e7eb;
      color: #111827;
    }

    .list-clean {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .experience-item {
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.18s ease;
      border-radius: 16px;
      padding: 2px;
    }

    .experience-item + .experience-item {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    body.ats-mode .experience-item + .experience-item {
      border-top-color: #e5e7eb;
    }

    .experience-item.core-highlight {
      background: linear-gradient(180deg, rgba(110,168,254,0.08), rgba(110,168,254,0.02));
      box-shadow: inset 0 0 0 1px rgba(110,168,254,0.18);
      padding: 16px;
    }

    body.ats-mode .experience-item.core-highlight {
      background: #f9fafb;
      box-shadow: inset 0 0 0 1px #d1d5db;
    }

    .experience-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .experience-role {
      margin: 0;
      font-size: 20px;
      color: #f6f8ff;
    }

    body.ats-mode .experience-role,
    body.ats-mode .project-title,
    body.ats-mode h1 {
      color: #111827;
    }

    .experience-company {
      margin: 4px 0 0;
      color: #c7d2fe;
      font-weight: 600;
    }

    body.ats-mode .experience-company { color: #1f2937; }

    .experience-period {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .experience-summary {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.65;
    }

    .project-primary {
      background: linear-gradient(180deg, rgba(139,92,246,0.10), rgba(139,92,246,0.02));
      box-shadow: inset 0 0 0 1px rgba(139,92,246,0.18);
      padding: 16px;
      border-radius: 16px;
    }

    body.ats-mode .project-primary {
      background: #f9fafb;
      box-shadow: inset 0 0 0 1px #d1d5db;
    }

    .empty-state {
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.18);
      padding: 16px;
      border-radius: 14px;
    }

    body.ats-mode .empty-state {
      color: #374151;
      border-color: #d1d5db;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #dbeafe;
      font-size: 12px;
      margin-bottom: 8px;
    }

    body.ats-mode .role-badge {
      background: #f3f4f6;
      border-color: #d1d5db;
      color: #111827;
    }

    .fade-swap { opacity: 0.85; }

    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      .sticky { position: static; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 16px; }
      .hero, .card { padding: 18px; }
      .experience-head { flex-direction: column; }
    }

    @media print {
      body {
        background: #ffffff !important;
        color: #111827 !important;
      }
      .wrap {
        max-width: 100%;
        padding: 0;
      }
      .hero, .card {
        background: #ffffff !important;
        color: #111827 !important;
        box-shadow: none !important;
        border: 1px solid #d1d5db !important;
        backdrop-filter: none !important;
      }
      .toolbar {
        display: none !important;
      }
      .layout {
        grid-template-columns: 300px 1fr;
      }
      .section-title, .experience-company, .headline, .chip, .summary, .meta, .experience-summary, .experience-period, a {
        color: #111827 !important;
      }
      .chip {
        background: #f3f4f6 !important;
        border: 1px solid #d1d5db !important;
      }
      .experience-item.core-highlight,
      .project-primary {
        background: #ffffff !important;
        box-shadow: inset 0 0 0 1px #d1d5db !important;
      }
      .experience-item,
      .card,
      .hero {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

    </main>

    let currentRole = 'base';
    let detailMode = 'recruiter';
    let currentLanguage = 'es';
    let isAtsMode = false;

    function byId(id) {
      return document.getElementById(id);
    }

    function t(key) {
      return UI_TEXT[currentLanguage][key];
    }

    function localize(value) {
      if (typeof value === 'string') return value;
      if (value && typeof value === 'object') return value[currentLanguage] || value.es || Object.values(value)[0] || '';
      return '';
    }

    function renderStaticLabels() {
      byId('labelMainView').textContent = t('mainView');
      byId('labelRoleViews').textContent = t('roleViews');
      byId('detailRecruiterBtn').textContent = t('recruiterView');
      byId('detailFullBtn').textContent = t('detailedView');
      byId('atsBtn').textContent = isAtsMode ? t('visualMode') : t('atsMode');
      byId('printBtn').textContent = t('exportPdf');
      byId('skillsTitle').textContent = t('skills');
      byId('achievementsTitle').textContent = t('achievements');
      byId('toolsTitle').textContent = t('tools');
      byId('educationAcademicTitle').textContent = t('educationAcademic');
      byId('educationComplementaryTitle').textContent = t('educationComplementary');
      byId('languagesTitle').textContent = t('languages');
      byId('experienceTitle').textContent = t('experience');
      byId('projectsTitle').textContent = t('projects');
    }

    function renderHeader() {
      const role = CV_DATA.roles[currentRole] || CV_DATA.roles.base;
      byId('name').textContent = CV_DATA.personal.name;
      byId('headline').textContent = localize(role.title);
      byId('summary').textContent = localize(role.summary);
      byId('location').textContent = localize(CV_DATA.personal.location);

      const email = byId('email');
      const encodedSubject = encodeURIComponent(localize(CV_DATA.personal.emailSubject));
      email.innerHTML = `<a href="mailto:${CV_DATA.personal.email}?subject=${encodedSubject}">${CV_DATA.personal.email}</a>`;

      const linkedin = byId('linkedin');
      linkedin.href = CV_DATA.personal.linkedin;
      linkedin.textContent = CV_DATA.personal.linkedin.replace('https://', '');
    }

    function renderRoleButtons() {
      const generalContainer = byId('generalRoleButtons');
      const specializedContainer = byId('specializedRoleButtons');
      generalContainer.innerHTML = '';
      specializedContainer.innerHTML = '';

      Object.entries(CV_DATA.roles).forEach(([key, role]) => {
        const btn = document.createElement('button');
        btn.className = 'btn' + (key === currentRole ? ' active' : '');
        btn.type = 'button';
        btn.textContent = localize(role.label);
        btn.addEventListener('click', () => {
          currentRole = key;
          rerenderAnimated();
        });

        if (key === 'base') generalContainer.appendChild(btn);
        else specializedContainer.appendChild(btn);
      });
    }

    function renderLanguageButtons() {
      byId('langEsBtn').classList.toggle('active', currentLanguage === 'es');
      byId('langEnBtn').classList.toggle('active', currentLanguage === 'en');
    }

    function renderSkills() {
      const container = byId('skillsGrouped');
      container.innerHTML = '';
      const groups = CV_DATA.roles[currentRole]?.skillGroups?.[currentLanguage] || CV_DATA.roles.base.skillGroups[currentLanguage] || {};

      Object.entries(groups).forEach(([groupName, items]) => {
        const block = document.createElement('div');
        block.style.marginBottom = '18px';
        block.innerHTML = `
          <div style="font-weight:700; color:inherit; margin-bottom:10px;">${groupName}</div>
          <ul class="list-clean">${items.map(item => `<li>${item}</li>`).join('')}</ul>
        `;
        container.appendChild(block);
      });
    }

    function renderAchievements() {
      const list = byId('achievements');
      list.innerHTML = '';
      (CV_DATA.achievements[currentLanguage] || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        list.appendChild(li);
      });
    }

    function renderTools() {
      const container = byId('tools');
      container.innerHTML = '';
      CV_DATA.tools.forEach(tool => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.textContent = tool;
        container.appendChild(span);
      });
    }

    function renderEducation() {
      const academic = byId('educationAcademic');
      const complementary = byId('educationComplementary');
      const languages = byId('languages');
      academic.innerHTML = '';
      complementary.innerHTML = '';
      languages.innerHTML = '';

      (CV_DATA.educationAcademic[currentLanguage] || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        academic.appendChild(li);
      });

      (CV_DATA.educationComplementary[currentLanguage] || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        complementary.appendChild(li);
      });

      (CV_DATA.languages[currentLanguage] || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        languages.appendChild(li);
      });
    }

    function getOrderedProjects() {
      const order = CV_DATA.projectOrder[currentRole] || CV_DATA.projectOrder.base || [];
      return order
        .map(id => ({ id, ...CV_DATA.projects[id] }))
        .filter(project => project && project.roleFit.includes(currentRole));
    }

    function renderProjects() {
      const container = byId('projects');
      container.innerHTML = '';
      const projects = getOrderedProjects();

      projects.forEach((project, index) => {
        const el = document.createElement('article');
        el.className = 'experience-item' + (index === 0 ? ' project-primary' : '');
        const badge = index === 0 ? `<div class="role-badge">${t('keyProject')}</div>` : '';
        el.innerHTML = `
          ${badge}
          <div class="experience-head">
            <div>
              <h3 class="experience-role project-title">${localize(project.title)}</h3>
            </div>
          </div>
          <p class="experience-summary">${localize(project.text)}</p>
          <div class="chips">${project.tags.map(tag => `<span class="chip">${tag}</span>`).join('')}</div>
        `;
        container.appendChild(el);
      });
    }

    function getOrderedExperiences() {
      const order = CV_DATA.roles[currentRole]?.order || CV_DATA.roles.base.order;
      const items = order
        .map(id => ({ id, ...CV_DATA.experience[id] }))
        .filter(exp => exp && exp.roleFit.includes(currentRole));

      const coreMap = {
        base: ['inetum', 'repsol', 'telefonica_tech', 'vodafone_pm'],
        it_business_partner: ['repsol', 'inetum'],
        project_manager: ['vodafone_pm', 'telefonica_tech'],
        pmo: ['vodafone_pm', 'inetum', 'repsol'],
        change_management: ['inetum', 'repsol'],
        transformation: ['repsol', 'inetum', 'vodafone_pm']
      };

      const relevantMap = {
        base: ['vodafone_account', 'telefonica_support', 'orange', 'security_system'],
        it_business_partner: ['vodafone_pm', 'telefonica_tech', 'security_system'],
        project_manager: ['inetum', 'repsol', 'security_system'],
        pmo: ['telefonica_tech', 'security_system'],
        change_management: ['vodafone_pm', 'telefonica_tech'],
        transformation: ['telefonica_tech', 'security_system']
      };

      const core = coreMap[currentRole] || [];
      const relevant = relevantMap[currentRole] || [];

      return items.map(exp => {
        let tier = 'background';
        if (currentRole === 'base') return { ...exp, tier: 'core' };
        if (core.includes(exp.id)) tier = 'core';
        else if (relevant.includes(exp.id)) tier = 'relevant';
        return { ...exp, tier };
      });
    }

    function getBulletsForExperience(exp) {
      let bullets = exp.bullets[detailMode]?.[currentLanguage] || [];
      if (exp.tier === 'core' && exp.bulletsByRole && exp.bulletsByRole[currentRole]) {
        bullets = exp.bulletsByRole[currentRole][currentLanguage] || bullets;
      }
      if (exp.tier === 'background' && detailMode === 'recruiter') {
        bullets = bullets.slice(0, 2);
      }
      if (detailMode === 'recruiter') {
        bullets = bullets.slice(0, 4);
      }
      return bullets;
    }

    function renderExperience() {
      const container = byId('experience');
      container.innerHTML = '';
      const items = getOrderedExperiences();

      if (!items.length) {
        container.innerHTML = `<div class="empty-state">${t('noData')}</div>`;
        return;
      }

      const tierLabel = {
        core: t('core'),
        relevant: t('relevant'),
        background: t('background')
      };

      let lastTier = null;

      items.forEach(exp => {
        if (currentRole !== 'base' && exp.tier !== lastTier) {
          const separator = document.createElement('div');
          separator.style.margin = lastTier === null ? '0 0 18px' : '24px 0 18px';
          separator.innerHTML = `<div class="section-title" style="font-size:11px; margin:0;">${tierLabel[exp.tier]}</div>`;
          container.appendChild(separator);
          lastTier = exp.tier;
        }

        const bullets = getBulletsForExperience(exp);
        const article = document.createElement('article');
        article.className = 'experience-item' + (exp.tier === 'core' ? ' core-highlight' : '');
        const badge = exp.tier === 'core' ? `<div class="role-badge">${t('keyExperience')}</div>` : '';
        article.innerHTML = `
          ${badge}
          <div class="experience-head">
            <div>
              <h3 class="experience-role">${localize(exp.role)}</h3>
              <div class="experience-company">${localize(exp.company)}</div>
            </div>
            <div class="experience-period">${localize(exp.period)}</div>
          </div>
          <p class="experience-summary">${localize(exp.summary)}</p>
          <ul class="list-clean">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>
        `;
        container.appendChild(article);
      });
    }

    function renderDetailButtons() {
      byId('detailRecruiterBtn').classList.toggle('active', detailMode === 'recruiter');
      byId('detailFullBtn').classList.toggle('active', detailMode === 'detailed');
    }

    function applyAtsMode() {
      document.body.classList.toggle('ats-mode', isAtsMode);
    }

    function rerenderAnimated() {
      byId('summary').classList.add('fade-swap');
      byId('experience').classList.add('fade-swap');
      byId('projects').classList.add('fade-swap');
      setTimeout(() => {
        renderAll();
        byId('summary').classList.remove('fade-swap');
        byId('experience').classList.remove('fade-swap');
        byId('projects').classList.remove('fade-swap');
      }, 80);
    }

    function renderAll() {
      renderStaticLabels();
      renderHeader();
      renderRoleButtons();
      renderLanguageButtons();
      renderSkills();
      renderAchievements();
      renderTools();
      renderEducation();
      renderProjects();
      renderExperience();
      renderDetailButtons();
      applyAtsMode();
    }

    byId('detailRecruiterBtn').addEventListener('click', () => {
      detailMode = 'recruiter';
      renderAll();
    });

    byId('detailFullBtn').addEventListener('click', () => {
      detailMode = 'detailed';
      renderAll();
    });

    byId('langEsBtn').addEventListener('click', () => {
      currentLanguage = 'es';
      renderAll();
    });

    byId('langEnBtn').addEventListener('click', () => {
      currentLanguage = 'en';
      renderAll();
    });

    byId('atsBtn').addEventListener('click', () => {
      isAtsMode = !isAtsMode;
      renderAll();
    });

    byId('printBtn').addEventListener('click', () => {
      window.print();
    });

    function runSmokeTests() {
      console.assert(typeof CV_DATA === 'object', 'CV_DATA debe existir');
      console.assert(typeof CV_DATA.roles === 'object', 'roles debe existir');
      console.assert(typeof CV_DATA.experience === 'object', 'experience debe existir');
      console.assert(typeof CV_DATA.projects === 'object', 'projects debe existir');
      console.assert(typeof CV_DATA.roles.base === 'object', 'roles.base debe existir');
      console.assert(typeof CV_DATA.roles.base.title.es === 'string', 'roles.base.title.es debe existir');
      console.assert(typeof CV_DATA.roles.base.title.en === 'string', 'roles.base.title.en debe existir');
      console.assert(Array.isArray(CV_DATA.roles.base.order), 'roles.base.order debe ser un array');
      console.assert(CV_DATA.roles.base.label.es === 'Perfil General', 'El label base ES debe ser Perfil General');
      console.assert(CV_DATA.roles.base.label.en === 'General Profile', 'El label base EN debe ser General Profile');
      console.assert(byId('generalRoleButtons') !== null, 'Debe existir generalRoleButtons');
      console.assert(byId('specializedRoleButtons') !== null, 'Debe existir specializedRoleButtons');
      console.assert(byId('langEsBtn') !== null && byId('langEnBtn') !== null, 'Deben existir botones de idioma');
      console.assert(byId('atsBtn') !== null, 'Debe existir botón ATS');
      console.assert(typeof getOrderedExperiences === 'function', 'getOrderedExperiences debe existir');
      const baseItems = getOrderedExperiences();
      console.assert(Array.isArray(baseItems), 'getOrderedExperiences debe devolver un array');
      console.assert(baseItems.length > 0, 'Debe haber experiencias para el rol base');
      console.assert(baseItems[0].id === 'inetum', 'El perfil general debe empezar por Inetum');
      console.assert(typeof getOrderedProjects === 'function', 'getOrderedProjects debe existir');
      const projectItems = getOrderedProjects();
      console.assert(Array.isArray(projectItems), 'getOrderedProjects debe devolver un array');
      console.assert(projectItems.length > 0, 'Debe haber proyectos visibles');
      currentLanguage = 'en';
      console.assert(localize(CV_DATA.personal.location) === 'Madrid, Spain', 'La localización en EN debe funcionar');
      currentLanguage = 'es';
    }

    renderAll();
    runSmokeTests();
  </script>
